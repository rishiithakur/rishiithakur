<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Current Focus — Rishabh Thakur</title>
  <desc>Animated premium current focus card</desc>
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="50%" stop-color="#06091a"/>
      <stop offset="100%" stop-color="#030812"/>
    </linearGradient>
    <!-- Border gradient -->
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="25%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Header gradient -->
    <linearGradient id="headG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Scanline -->
    <linearGradient id="scanG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- Row card gradients -->
    <linearGradient id="row1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1f35"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <linearGradient id="row2g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#160d2e"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <linearGradient id="row3g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1f20"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <linearGradient id="row4g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <linearGradient id="row5g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#070f1a"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#06b6d4" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="44" flood-color="#7c3aed" flood-opacity="0.12"/>
    </filter>
    <filter id="headGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="gb"/>
      <feMerge><feMergeNode in="gb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#fff" stroke-width="0.16" stroke-opacity="0.028"/>
    </pattern>
    <clipPath id="clip">
      <rect x="2" y="2" width="856" height="316" rx="20"/>
    </clipPath>
  </defs>

  <!-- Shadow layer -->
  <rect x="8" y="8" width="844" height="304" rx="20" fill="none"
        stroke="url(#borderG)" stroke-width="2" opacity="0.35" filter="url(#shadow)"/>

  <!-- Card BG -->
  <rect x="2" y="2" width="856" height="316" rx="20" fill="url(#bg)"/>
  <rect x="2" y="2" width="856" height="316" rx="20" fill="url(#grid)"/>

  <!-- Animated background elements -->
  <g clip-path="url(#clip)">
    <!-- Orbs -->
    <ellipse cx="800" cy="60" rx="150" ry="150" fill="url(#orb1)">
      <animateTransform attributeName="transform" type="translate" values="0,0;-20,25;0,0" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="80" cy="280" rx="110" ry="110" fill="url(#orb2)">
      <animateTransform attributeName="transform" type="translate" values="0,0;18,-18;0,0" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="430" cy="160" rx="180" ry="70" fill="url(#orb3)">
      <animateTransform attributeName="transform" type="translate" values="0,0;8,12;0,0" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Scanline sweep -->
    <rect x="2" y="-50" width="856" height="50" fill="url(#scanG)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,380;0,0" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Particles -->
    <circle cx="180" cy="40" r="1.4" fill="#38bdf8" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;28;40" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="80" r="1" fill="#a78bfa" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4.1s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;68;80" dur="4.1s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="290" r="1.2" fill="#34d399" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="200" r="1" fill="#f472b6" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3.7s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;188;200" dur="3.7s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="260" r="1.3" fill="#7c3aed" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0;0.45" dur="5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;248;260" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="240" r="1" fill="#38bdf8" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0;0.35" dur="4.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Border layers -->
  <rect x="2" y="2" width="856" height="316" rx="20" fill="none"
        stroke="url(#borderG)" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <rect x="2" y="2" width="856" height="316" rx="20" fill="none"
        stroke="url(#borderG)" stroke-width="0.5" opacity="0.55"/>
  <!-- Pulse border -->
  <rect x="2" y="2" width="856" height="316" rx="20" fill="none"
        stroke="url(#borderG)" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0.22;0" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ══ HEADER ══ -->
  <!-- Header section bg -->
  <rect x="2" y="2" width="856" height="54" rx="20" fill="#060d1e" opacity="0.7"/>
  <rect x="2" y="36" width="856" height="20" fill="#060d1e" opacity="0.7"/>

  <!-- Header divider line -->
  <rect x="30" y="55" width="800" height="0.8" fill="url(#borderG)" opacity="0.35"/>

  <!-- Left accent bar -->
  <rect x="30" y="70" width="2.5" height="222" rx="1.25" fill="url(#borderG)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- CURRENT FOCUS label -->
  <text x="430" y="22" font-family="'Segoe UI', Inter, sans-serif" font-size="10" font-weight="600"
        fill="#06b6d4" letter-spacing="5" text-anchor="middle" opacity="0">
    ◈  CURRENT  FOCUS  ◈
    <animate attributeName="opacity" values="0;0.7" dur="0.8s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- Main heading -->
  <text x="430" y="46" font-family="'Segoe UI', Inter, system-ui, sans-serif"
        font-weight="700" font-size="22" fill="url(#headG)" text-anchor="middle"
        filter="url(#headGlow)" letter-spacing="1" opacity="0">
    What I'm Building Now
    <animate attributeName="opacity" values="0;1" dur="1s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- ══ FOCUS ROWS ══ -->

  <!-- Row 1 — AI -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="48" y="68" width="764" height="38" rx="9" fill="url(#row1g)" stroke="#06b6d4" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- Shimmer border -->
    <rect x="48" y="68" width="764" height="38" rx="9" fill="none" stroke="#06b6d4" stroke-width="1.2" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.18;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Left accent pill -->
    <rect x="48" y="68" width="4" height="38" rx="2" fill="#38bdf8" filter="url(#softglow)"/>
    <!-- Icon bg -->
    <rect x="62" y="76" width="28" height="22" rx="6" fill="#06b6d4" fill-opacity="0.12"/>
    <text x="76" y="91" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle">🤖</text>
    <!-- Text -->
    <text x="102" y="91" font-family="'Segoe UI', Inter, sans-serif" font-size="13.5" fill="#e2e8f0" font-weight="400">
      AI-powered web applications &amp; intelligent automation
    </text>
    <!-- Right tag -->
    <rect x="740" y="76" width="62" height="20" rx="10" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="771" y="90" font-family="'Segoe UI', Inter, sans-serif" font-size="9.5" fill="#38bdf8" text-anchor="middle" letter-spacing="0.5">AI / ML</text>
  </g>

  <!-- Row 2 — GIS -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.65s" fill="freeze"/>
    <rect x="48" y="114" width="764" height="38" rx="9" fill="url(#row2g)" stroke="#7c3aed" stroke-width="0.6" stroke-opacity="0.4"/>
    <rect x="48" y="114" width="764" height="38" rx="9" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.18;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="114" width="4" height="38" rx="2" fill="#a78bfa" filter="url(#softglow)"/>
    <rect x="62" y="122" width="28" height="22" rx="6" fill="#7c3aed" fill-opacity="0.15"/>
    <text x="76" y="137" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle">🌍</text>
    <text x="102" y="137" font-family="'Segoe UI', Inter, sans-serif" font-size="13.5" fill="#e2e8f0" font-weight="400">
      Advanced GIS for hydrology &amp; environmental monitoring
    </text>
    <rect x="740" y="122" width="62" height="20" rx="10" fill="#7c3aed" fill-opacity="0.1" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="771" y="136" font-family="'Segoe UI', Inter, sans-serif" font-size="9.5" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.5">GIS</text>
  </g>

  <!-- Row 3 — UI/UX -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
    <rect x="48" y="160" width="764" height="38" rx="9" fill="url(#row3g)" stroke="#34d399" stroke-width="0.6" stroke-opacity="0.35"/>
    <rect x="48" y="160" width="764" height="38" rx="9" fill="none" stroke="#34d399" stroke-width="1.2" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.16;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="160" width="4" height="38" rx="2" fill="#34d399" filter="url(#softglow)"/>
    <rect x="62" y="168" width="28" height="22" rx="6" fill="#34d399" fill-opacity="0.1"/>
    <text x="76" y="183" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle">🎨</text>
    <text x="102" y="183" font-family="'Segoe UI', Inter, sans-serif" font-size="13.5" fill="#e2e8f0" font-weight="400">
      Premium frontend UI/UX &amp; high-conversion web design
    </text>
    <rect x="740" y="168" width="62" height="20" rx="10" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.45"/>
    <text x="771" y="182" font-family="'Segoe UI', Inter, sans-serif" font-size="9.5" fill="#6ee7b7" text-anchor="middle" letter-spacing="0.5">UI / UX</text>
  </g>

  <!-- Row 4 — Freelance -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.95s" fill="freeze"/>
    <rect x="48" y="206" width="764" height="38" rx="9" fill="url(#row4g)" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.35"/>
    <rect x="48" y="206" width="764" height="38" rx="9" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.16;0" dur="3.8s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="206" width="4" height="38" rx="2" fill="#f59e0b" filter="url(#softglow)"/>
    <rect x="62" y="214" width="28" height="22" rx="6" fill="#f59e0b" fill-opacity="0.1"/>
    <text x="76" y="229" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle">💼</text>
    <text x="102" y="229" font-family="'Segoe UI', Inter, sans-serif" font-size="13.5" fill="#e2e8f0" font-weight="400">
      Freelancing &amp; delivering solutions for global clients
    </text>
    <rect x="740" y="214" width="62" height="20" rx="10" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.45"/>
    <text x="771" y="228" font-family="'Segoe UI', Inter, sans-serif" font-size="9.5" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">WORK</text>
  </g>

  <!-- Row 5 — LLM Gov -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <rect x="48" y="252" width="764" height="38" rx="9" fill="url(#row5g)" stroke="#ec4899" stroke-width="0.6" stroke-opacity="0.35"/>
    <rect x="48" y="252" width="764" height="38" rx="9" fill="none" stroke="#ec4899" stroke-width="1.2" stroke-opacity="0">
      <animate attributeName="stroke-opacity" values="0;0.16;0" dur="4.2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="252" width="4" height="38" rx="2" fill="#ec4899" filter="url(#softglow)"/>
    <rect x="62" y="260" width="28" height="22" rx="6" fill="#ec4899" fill-opacity="0.1"/>
    <text x="76" y="275" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle">📡</text>
    <text x="102" y="275" font-family="'Segoe UI', Inter, sans-serif" font-size="13.5" fill="#e2e8f0" font-weight="400">
      Integrating LLMs into government data infrastructure
    </text>
    <rect x="740" y="260" width="62" height="20" rx="10" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.45"/>
    <text x="771" y="274" font-family="'Segoe UI', Inter, sans-serif" font-size="9.5" fill="#f9a8d4" text-anchor="middle" letter-spacing="0.5">LLM</text>
  </g>

  <!-- Bottom bar -->
  <rect x="30" y="300" width="800" height="0.75" fill="url(#borderG)" opacity="0.2"/>

  <!-- Corner bracket accents -->
  <path d="M 14 40 L 14 16 L 38 16" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M 846 40 L 846 16 L 822 16" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M 14 282 L 14 306 L 38 306" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M 846 282 L 846 306 L 822 306" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Pulsing corner dots -->
  <circle cx="28" cy="28" r="3" fill="#06b6d4" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="832" cy="28" r="3" fill="#a855f7" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="294" r="3" fill="#a855f7" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="3.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="832" cy="294" r="3" fill="#34d399" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="2.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.3s" repeatCount="indefinite"/>
  </circle>
</svg>
