<svg width="860" height="380" viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Rishabh Thakur — Ultra Premium Developer Card</title>
  <desc>Animated glassmorphism identity card for Rishabh Thakur</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020510"/>
      <stop offset="50%" stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#030812"/>
    </linearGradient>
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="65%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#06b6d4" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="40" flood-color="#7c3aed" flood-opacity="0.12"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/>
      <feFlood flood-color="#38bdf8" flood-opacity="0.55" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="gb"/>
      <feMerge><feMergeNode in="gb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purpleGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="gb"/>
      <feMerge><feMergeNode in="gb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-width="0.18" stroke-opacity="0.032"/>
    </pattern>
    <clipPath id="cardClip">
      <rect x="2" y="2" width="856" height="376" rx="20"/>
    </clipPath>
